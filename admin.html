<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ-панель — Цвети</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .admin-panel { max-width: 800px; margin: 40px auto; padding: 20px; }
        .admin-form { background: var(--white); padding: 24px; border-radius: 16px; margin-bottom: 30px; border: 1px solid var(--border); }
        .admin-form input, .admin-form textarea, .admin-form select {
            width: 100%; padding: 10px 14px; margin-bottom: 12px;
            border: 2px solid var(--border); border-radius: 10px; font-size: 15px;
        }
        .admin-form input:focus, .admin-form textarea:focus { outline: none; border-color: var(--dark-green); }
        .admin-form .checkbox-group { display: flex; gap: 20px; margin: 10px 0; }
        .admin-form .checkbox-group label { display: flex; align-items: center; gap: 8px; cursor: pointer; }
        .admin-product-item { display: flex; justify-content: space-between; padding: 12px 16px; border-bottom: 1px solid var(--border); align-items: center; }
        .admin-product-item .info { display: flex; align-items: center; gap: 16px; }
        .admin-product-item .info img { width: 50px; height: 50px; object-fit: cover; border-radius: 8px; }
        .admin-product-item .info .emoji { font-size: 32px; }
        .btn-delete { background: #d32f2f; color: white; border: none; padding: 6px 16px; border-radius: 8px; cursor: pointer; }
        .btn-edit { background: var(--dark-green); color: white; border: none; padding: 6px 16px; border-radius: 8px; cursor: pointer; }
        .file-upload-wrapper { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; margin: 10px 0; }
        .file-upload-wrapper input[type="file"] { display: none; }
        .file-upload-label { padding: 10px 24px; background: var(--light-gray); border: 2px dashed var(--border); border-radius: 10px; cursor: pointer; }
        .image-preview { width: 80px; height: 80px; border-radius: 10px; overflow: hidden; border: 2px solid var(--border); display: none; }
        .image-preview img { width: 100%; height: 100%; object-fit: cover; }
        .image-preview.has-image { display: block; }
        .upload-status { font-size: 13px; color: var(--text-light); margin-top: 6px; display: none; }
        .upload-status.active { display: block; }
        .upload-status.success { color: #2E7D32; }
        .upload-status.error { color: #D32F2F; }
    </style>
</head>
<body>

<div class="admin-panel">

    <!-- ВХОД -->
    <div id="login-section">
        <div style="background:var(--white);padding:40px;border-radius:16px;max-width:400px;margin:0 auto;text-align:center;border:1px solid var(--border);">
            <h2>🔐 Админ-панель</h2>
            <p>Введите пароль для управления товарами</p>
            <input type="password" id="password-input" placeholder="Введите пароль" style="width:100%;padding:12px;border:2px solid var(--border);border-radius:10px;margin:12px 0;">
            <button class="btn-primary" onclick="login()">Войти</button>
            <div id="login-error" style="color:#d32f2f;margin-top:10px;"></div>
        </div>
    </div>

    <!-- АДМИНКА -->
    <div id="admin-section" style="display:none;">

        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
            <h1>📱 Управление товарами</h1>
            <button class="btn-primary" onclick="logout()">Выйти</button>
        </div>

        <!-- ФОРМА -->
        <div class="admin-form">
            <h3 id="form-title">➕ Добавить товар</h3>
            <input type="text" id="product-name" placeholder="Название товара *">
            <input type="number" id="product-price" placeholder="Цена (₽) *">
            <textarea id="product-description" placeholder="Краткое описание" rows="2"></textarea>
            <select id="product-category">
                <option value="букеты">Букеты</option>
                <option value="композиции">Композиции</option>
                <option value="премиум">Премиум</option>
            </select>

            <!-- ЗАГРУЗКА ФОТО -->
            <div style="margin:12px 0;">
                <label>Фото товара</label>
                <div class="file-upload-wrapper">
                    <label class="file-upload-label" for="image-upload">📁 Выбрать фото</label>
                    <input type="file" id="image-upload" accept="image/*" onchange="handleImageUpload(event)">
                    <div class="image-preview" id="image-preview">
                        <img id="preview-img" src="" alt="Превью">
                    </div>
                    <div class="upload-status" id="upload-status"></div>
                </div>
                <input type="text" id="product-image" placeholder="Путь к фото (заполнится автоматически)" style="margin-top:8px;" readonly>
            </div>

            <div class="checkbox-group">
                <label><input type="checkbox" id="product-new"> 🆕 Новинка</label>
                <label><input type="checkbox" id="product-hit"> ⭐ Хит продаж</label>
            </div>

            <button class="btn-primary" id="submit-btn" onclick="addProduct()">➕ Добавить</button>
            <button class="btn-primary" onclick="resetForm()" style="background:#999;display:none;" id="cancel-btn">Отмена</button>
        </div>

        <!-- СПИСОК ТОВАРОВ -->
        <div style="background:var(--white);border-radius:16px;border:1px solid var(--border);overflow:hidden;">
            <div style="display:flex;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border);">
                <h3>📋 Список товаров</h3>
                <button class="btn-primary" onclick="openAddForm()">+ Добавить</button>
            </div>
            <div id="product-list-admin"><p style="padding:20px;color:var(--text-light);">Загрузка...</p></div>
        </div>

    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="admin.js"></script>

</body>
</html>
